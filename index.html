<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMAZR: Field Challenge</title>
    <style>
		html, body {
		  margin: 0;
		  padding: 0;
		}
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100svh;
            margin: 0;
            padding-left: 20px;
			padding-right: 20px;
            text-align: center;
        }
        .card {
            background: #1e1e1e;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            max-width: 400px;
            border: 1px solid #333;
        }
        /* Added user-select none so dblclick is smooth */
        h1 { 
            color: #ffca28; 
            margin-bottom: 0.5rem; 
            letter-spacing: 4px; 
            font-weight: 900; 
            cursor: pointer;
            user-select: none; 
        }
        #case-id { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        .clue-box {
            background: #252525;
            padding: 20px;
            border-top: 4px solid #ffca28;
            margin: 20px 0;
            font-size: 1.1rem;
            font-style: italic;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        button {
            background-color: #ffca28;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s, background-color 0.2s;
        }
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #444; color: #888; cursor: not-allowed; }
        
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #121212;
            color: #fff;
            box-sizing: border-box;
            text-align: center;
            font-size: 1rem;
        }

        .reset-link {
            margin-top: 25px;
            font-size: 0.7rem;
            color: #666;
            text-decoration: underline;
            cursor: pointer;
            display: inline-block;
        }
        .reset-link:hover { color: #ff5252; }
        #status { margin-top: 20px; font-weight: bold; min-height: 24px; font-size: 0.9rem; }
        .success { color: #4caf50; }
        .error { color: #ff5252; }
        .progress { font-size: 0.8rem; color: #ffca28; margin-top: 10px; opacity: 0.8; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="admin-trigger">AMAZR</h1>
        <div id="case-id">Loading...</div>
        
        <div id="clue-text" class="clue-box">
            Syncing coordinates...
        </div>

        <div id="location-ui">
            <button id="checkBtn">CHECK LOCATION</button>
        </div>

        <div id="trivia-ui" class="hidden">
            <input type="text" id="triviaInput" placeholder="Enter your answer...">
            <button id="submitTriviaBtn">SUBMIT ANSWER</button>
        </div>

        <div class="progress" id="progress-text">Station 0 of 0</div>
        <div id="status"></div>

        <div class="reset-link" id="resetBtn">Reset Race Progress</div>
    </div>

    <script>
        const CLUES = [
			{
				id: "STATION 1",
				text: "This is the easy one. Go to the BBQ area to check in and test your phone!",
				lat_test: -37.82553, 
                lon_test: 144.85302,
				lat: -36.89620871657927, 
				lon: 149.9112405183021,
				question: "Complete the donut challenge. When you're finished. Ask the station master for the password and enter it here. Then you're off and running!",
				answer: "donut",
				spot: "skate park"
			},
			{
				id: "STATION 2",
				text: "There’s a concrete playground you need to find! It’s not for swings and it’s not for slides, it’s for 4-wheeled boards and two-wheeled rides. It's in the 'Ford' that doesn’t have an engine but instead is a park! Check in next to the BBQ under the blue roof.",
				lat_test: -37.82553, 
                lon_test: 144.85302,
				lat: -36.89712859003159,
				lon: 149.9146926789455,
				question: "Ask the station master where to dig. When you find the hidden coin, the station master will give you the password to enter here.",
				answer: "silver",
				spot: "skate park"
			},
            {
                id: "STATION 3",
                text: "Over where the 'pen' once stood, find the most photographed blue shed in the neighborhood. Built for nets but now for brews, stand where the jumpers have nothing to lose.",
                lat_test: -37.82553, 
                lon_test: 144.85302,
				lat: -36.89410281516334, 
				lon: 149.9190235268289,
                question: "What is the sum of Stephen Curry's jersey number plus Max Gawn's jumper number?",
                answer: "41",
				spot: "Michies"
            },
            {
                id: "STATION 4",
                text: "Get on 'board' and 'walk' on water without getting wet, past the mangroves and the sunset's silhouette. Follow the path that snakes by the shore, through the trees where the oysters are plenty and more. Check in at the start of the walk next to the fisheries building. It has big 'Keep Clear' signs painted on the garage doors in white, a ladder on the roof and a map of the fish you can catch on the wall.",
                lat_test: -37.82553, 
                lon_test: 144.85302,
				lat: -36.89454044417496, 
				lon: 149.9082272789569,
                question: "What sea creature is Merimbula especially known for farming?",
                answer: "oyster",
				spot: "boardwalk"
            },
			{
				id: "STATION 5",
				text: "I have a mane but I’m not a true horse, I live in the ocean (usually, of course!). Find me standing guard on the street, right where the 'Vine' and the 'Pizza' meet.",
				lat_test: -37.82553, 
                lon_test: 144.85302,
				lat: -36.889566969749005,
				lon: 149.91067635435252,
				question: "Go to the wordle website and solve the puzzle. Enter today's word to progress.",
				answer: "inlet",
				spot: "Starfish"
			},			
            /*{
                id: "STATION 3",
                text: "A place for lessons in 1873, built of stone for all to see. The master lived where the students played, now history's secrets are here displayed.",
                lat_test: -37.82553, 
                lon_test: 144.85302,
				lat: -36.88655260469643,
				lon: 149.9120725814209,
                question: "This building was constructed using stone quarried from which nearby local area?",
                answer: "Pambula",
				spot: "merimbula old school museum"
            },*/
			{
				id: "STATION 6",
				text: "Time to climb the giant hill to the top, at the Big Blue Jewel where the bowlers stop! Look for the place with the 'Sapphire' name, where people play bowls for a barefoot game. Check in at the front steps.",
				lat_test: -37.82553, 
                lon_test: 144.85302,
				lat: -36.88695035020294,
				lon: 149.90832963292715,
				question: "<div style='display: block; text-align: left;'>Go to this site:<br><a target='_blank' href='https://www.youtube.com/watch?v=wtq6yTm1HPs'>Humpty Dance</a><br>And observe the dance. You must learn it and perform it for the station master for 1 continuous minute. When they are happy with your dance, they will give you the password to enter here.</div>",
				answer: "dance",
				spot: "sapphire club"
			},
			{
				id: "STATION 7",
				text: "Time for a treat that's frosty and sweet! Head to the shop with the cones and the scoops. They say the boss has a 'bird-brained' nickname—find 'Frog Mouth’s' den to stay in the game!",
				lat_test: -36.8891, 
				lon_test: 149.9082,
				lat: -36.88797135928011,
				lon: 149.91025496073058,
				question: "What is the name of the current chinese dragon in Bendigo?",
				answer: "dai gum loong",
				spot: "ice cream shop"
			},
			{
				id: "STATION 8",
				text: "Back down the hill from the heights, toward the town and the harbor lights! Look for the shop that says it's 'The Boss' of the great outdoors. If you need a tent or a fishing reel, this is the place to hook you up.",
				lat_test: -37.82553, 
                lon_test: 144.85302,
				lat: -36.891009835745734, 
				lon: 149.91049847715811,
				question: "The station master has a challenge for you. Once completed, they will give you the password to proceed.",
				answer: "oyster",
				spot: "boss outdoor"
			},
			{
				id: "FINISH LINE",
				text: "The final dash! Head for the shore, where the boat trailers queue, the pelicans soar and the aeroplanes roar. Walk out on the wooden jetty by the boat ramp—the first one there is the AMAZR champ!",
				lat_test: -37.82553, 
                lon_test: 144.85302,
				lat: -36.89602190534698,
				lon: 149.910579536775,
				question: "How many crabs plus worms did we catch on Monday?",
				answer: "7",
				spot: "boat ramp"
			}
        ];

        let currentStep = 0;
        let isTriviaMode = false;
        const SUCCESS_RADIUS_METERS = 50;
        const STORAGE_KEY = "amazr_progress";

        const checkBtn = document.getElementById('checkBtn');
        const submitTriviaBtn = document.getElementById('submitTriviaBtn');
        const triviaInput = document.getElementById('triviaInput');
        const locationUi = document.getElementById('location-ui');
        const triviaUi = document.getElementById('trivia-ui');
        const adminTrigger = document.getElementById('admin-trigger');
        
        const resetBtn = document.getElementById('resetBtn');
        const statusDiv = document.getElementById('status');
        const clueDiv = document.getElementById('clue-text');
        const caseIdDiv = document.getElementById('case-id');
        const progressDiv = document.getElementById('progress-text');

        // --- LOCAL STORAGE LOGIC ---

        function saveProgress() {
            const data = {
                step: currentStep,
                triviaMode: isTriviaMode,
                date: new Date().toISOString().split('T')[0] 
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadProgress() {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                const parsed = JSON.parse(savedData);
                const today = new Date().toISOString().split('T')[0];
                if (parsed.date === today) {
                    currentStep = parsed.step;
                    isTriviaMode = parsed.triviaMode || false;
                } else {
                    localStorage.removeItem(STORAGE_KEY);
                }
            }
        }

        // --- ADMIN BYPASS LOGIC ---

        adminTrigger.addEventListener('dblclick', () => {
            const jumpTo = prompt(`ADMIN MODE\nEnter Station # (1-${CLUES.length}), "F" for Finish, or "Z" to force GPS Success:`);
            if (jumpTo === null) return;

            const input = jumpTo.trim().toLowerCase();

            if (input === 'z') {
                // Force GPS Success: Move to Trivia for current step
                isTriviaMode = true;
                statusDiv.innerHTML = "✓ ADMIN OVERRIDE: GPS SUCCESS";
                statusDiv.className = "success";
            } else if (input === 'f') {
                currentStep = CLUES.length;
                isTriviaMode = false;
            } else {
                const val = parseInt(input);
                if (!isNaN(val) && val >= 1 && val <= CLUES.length) {
                    currentStep = val - 1;
                    isTriviaMode = false; // Always jump back to location check mode for specific station jumps
                } else {
                    alert("Invalid input.");
                    return;
                }
            }
            saveProgress();
            updateDisplay();
        });

        // --- CORE GAMEPLAY ---

        function updateDisplay() {
            if (currentStep < CLUES.length) {
                caseIdDiv.innerText = `${CLUES[currentStep].id}`;
                progressDiv.innerText = `Station ${currentStep + 1} of ${CLUES.length}`;
                
                // Don't clear status if it was just set by Z-code override
                if (!statusDiv.innerHTML.includes("ADMIN OVERRIDE")) {
                    statusDiv.innerText = "";
                    statusDiv.className = "";
                }

                if (isTriviaMode) {
                    clueDiv.innerHTML = `TRIVIA: ${CLUES[currentStep].question}`;
                    locationUi.classList.add('hidden');
                    triviaUi.classList.remove('hidden');
                    triviaInput.value = "";
                } else {
                    clueDiv.innerText = `"${CLUES[currentStep].text}"`;
                    locationUi.classList.remove('hidden');
                    triviaUi.classList.add('hidden');
                    checkBtn.disabled = false;
                }
            } else {
                caseIdDiv.innerText = "FINISH LINE";
                clueDiv.innerText = "Congratulations! Field agent status: ELITE.";
                progressDiv.innerText = "AMAZR - Race Complete";
                locationUi.classList.add('hidden');
                triviaUi.classList.add('hidden');
                checkBtn.style.display = "none";
                statusDiv.innerText = "";
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI / 180;
            const φ2 = lat2 * Math.PI / 180;
            const Δφ = (lat2 - lat1) * Math.PI / 180;
            const Δλ = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                      Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        checkBtn.addEventListener('click', () => {
            statusDiv.innerHTML = "PINGING SATELLITE...";
            statusDiv.className = "";
            checkBtn.disabled = true;

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const dist = calculateDistance(
                        position.coords.latitude, 
                        position.coords.longitude, 
                        CLUES[currentStep].lat, 
                        CLUES[currentStep].lon
                    );

                    if (dist <= SUCCESS_RADIUS_METERS) {
                        isTriviaMode = true;
                        saveProgress();
                        statusDiv.innerHTML = "✓ LOCATION MATCHED! NOW ANSWER THIS...";
                        statusDiv.className = "success";
                        setTimeout(updateDisplay, 2000);
                    } else {
                        statusDiv.innerHTML = `NOT THERE YET! (${Math.round(dist)}m)`;
                        statusDiv.className = "error";
                        checkBtn.disabled = false;
                    }
                },
                (err) => {
                    statusDiv.innerHTML = "GPS SIGNAL BLOCKED.";
                    statusDiv.className = "error";
                    checkBtn.disabled = false;
                },
                { enableHighAccuracy: true }
            );
        });

        submitTriviaBtn.addEventListener('click', () => {
            const userAnswer = triviaInput.value.trim().toLowerCase();
            const correctAnswer = CLUES[currentStep].answer.toLowerCase();

            if (userAnswer === correctAnswer) {
                statusDiv.innerHTML = "CORRECT! UNLOCKING NEXT CLUE...";
                statusDiv.className = "success";
                setTimeout(() => {
                    currentStep++;
                    isTriviaMode = false;
                    saveProgress();
                    updateDisplay();
                }, 2000);
            } else {
                statusDiv.innerHTML = "INCORRECT. LOOK CLOSER!";
                statusDiv.className = "error";
            }
        });

        resetBtn.addEventListener('click', () => {
            if (confirm("Are you sure you want to restart the race from Clue 1?")) {
                currentStep = 0;
                isTriviaMode = false;
                localStorage.removeItem(STORAGE_KEY);
                checkBtn.style.display = "block";
                updateDisplay();
            }
        });

        // --- INIT ---
        loadProgress();
        updateDisplay();
    </script>
</body>
</html>
